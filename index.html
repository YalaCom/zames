<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Битва: Timmy_Roobeer vs Nazario Corleone</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #0f0;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-transform: uppercase;
            border-bottom: 2px solid #0f0;
            display: inline-block;
            padding-bottom: 10px;
        }
        .arena {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 400px;
            margin-top: 30px;
            position: relative;
        }
        .fighter {
            width: 150px;
            height: 250px;
            position: relative;
            transition: transform 0.1s;
        }
        /* Простые модельки из CSS блоков */
        .head { width: 60px; height: 60px; background: #ccc; margin: 0 auto; border-radius: 50%; position: relative; z-index: 2;}
        .body { width: 80px; height: 100px; background: #555; margin: -10px auto 0; position: relative; z-index: 1;}
        .legs { width: 80px; height: 80px; margin: 0 auto; display: flex; justify-content: space-between;}
        .leg { width: 35px; height: 100%; background: #333; }
        
        /* Уникальные стили */
        #p1 .head { background: #3498db; box-shadow: 0 0 10px #3498db; } /* FBI - Синий */
        #p1 .body { background: #2980b9; }
        #p1 .badge { position: absolute; top: 70px; left: 65px; width: 20px; height: 20px; background: gold; border-radius: 50%; z-index: 3; }

        #p2 .head { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; } /* Gov - Красный */
        #p2 .body { background: #c0392b; }
        #p2 .suit { position: absolute; top: 60px; left: 55px; width: 90px; height: 110px; border: 2px solid black; z-index: 2; pointer-events: none;}

        .name-tag {
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
        }

        .hp-bar-container {
            width: 100%;
            height: 10px;
            background: #333;
            margin-top: 10px;
        }
        .hp-bar {
            height: 100%;
            background: #0f0;
            width: 100%;
            transition: width 0.2s;
        }

        .controls {
            margin-top: 30px;
            border: 1px solid #0f0;
            padding: 20px;
            display: inline-block;
            background: #000;
        }
        input {
            background: #222;
            border: 1px solid #0f0;
            color: #fff;
            padding: 5px;
            font-family: inherit;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .log {
            margin-top: 20px;
            height: 100px;
            overflow-y: scroll;
            border: 1px dashed #555;
            text-align: left;
            padding: 10px;
            font-size: 12px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* Анимации */
        .hit-anim { transform: translateX(-20px) rotate(-5deg); filter: brightness(2); }
        .attack-anim-right { transform: translateX(50px); }
        .attack-anim-left { transform: translateX(-50px); }
    </style>
</head>
<body>

    <h1>КОНФЕРЕНЦИЯ</h1>

    <div class="arena">
        <!-- Боец 1 -->
        <div id="p1" class="fighter">
            <div class="head"></div>
            <div class="body"><div class="badge"></div></div>
            <div class="legs"><div class="leg"></div><div class="leg"></div></div>
            <div class="name-tag">[FBI][9]<br>Timmy_Roobeer</div>
            <div class="hp-bar-container"><div id="hp1" class="hp-bar"></div></div>
        </div>

        <div style="font-size: 40px;">VS</div>

        <!-- Боец 2 -->
        <div id="p2" class="fighter">
            <div class="head"></div>
            <div class="body"><div class="suit"></div></div>
            <div class="legs"><div class="leg"></div><div class="leg"></div></div>
            <div class="name-tag">[Governor]<br>Nazario Corleone</div>
            <div class="hp-bar-container"><div id="hp2" class="hp-bar"></div></div>
        </div>
    </div>

    <div class="controls">
        <div id="betting-panel">
            <p>СДЕЛАЙТЕ СТАВКУ (BTC)</p>
            <select id="bet-choice">
                <option value="p1">[FBI] Timmy_Roobeer</option>
                <option value="p2">[Gov] Nazario Corleone</option>
            </select>
            <input type="number" id="bet-amount" placeholder="Сумма" min="1">
            <button onclick="startFight()">НАЧАТЬ БОЙ</button>
        </div>
        <div id="result-display" style="display:none;">
            <h2 id="winner-text"></h2>
            <button onclick="resetGame()">НОВЫЙ БОЙ</button>
        </div>
    </div>

    <div class="log" id="battle-log"></div>

    <script>
        let hp1 = 100;
        let hp2 = 100;
        let isFighting = false;
        let userBet = 0;
        let userChoice = '';
        let balance = 1000; // Виртуальный баланс для примера

        function log(msg) {
            const div = document.getElementById('battle-log');
            div.innerHTML += `> ${msg}<br>`;
            div.scrollTop = div.scrollHeight;
        }

        function startFight() {
            const amount = document.getElementById('bet-amount').value;
            if (!amount || amount <= 0) {
                alert("Введите сумму ставки!");
                return;
            }
            
            userBet = parseInt(amount);
            userChoice = document.getElementById('bet-choice').value;
            
            document.getElementById('betting-panel').style.display = 'none';
            isFighting = true;
            log("БОЙ НАЧАЛСЯ!");
            
            fightLoop();
        }

        function fightLoop() {
            if (hp1 <= 0 || hp2 <= 0) {
                endGame();
                return;
            }

            // Случайный удар
            const turn = Math.random() > 0.5 ? 1 : 2;
            
            if (turn === 1) {
                // Timmy бьет Nazario
                animateHit('p1', 'right');
                const dmg = Math.floor(Math.random() * 15) + 5;
                hp2 -= dmg;
                updateHp();
                log(`[FBI] Timmy_Roobeer нанес ${dmg} урона!`);
            } else {
                // Nazario бьет Timmy
                animateHit('p2', 'left');
                const dmg = Math.floor(Math.random() * 15) + 5;
                hp1 -= dmg;
                updateHp();
                log(`[Gov] Nazario Corleone нанес ${dmg} урона!`);
            }

            if (hp1 > 0 && hp2 > 0) {
                setTimeout(fightLoop, 800);
            } else {
                setTimeout(endGame, 500);
            }
        }

        function animateHit(elementId, direction) {
            const el = document.getElementById(elementId);
            const animClass = direction === 'right' ? 'attack-anim-right' : 'attack-anim-left';
            el.classList.add(animClass);
            setTimeout(() => el.classList.remove(animClass), 200);
            
            // Эффект получения урона противником
            const targetId = elementId === 'p1' ? 'p2' : 'p1';
            const target = document.getElementById(targetId);
            target.classList.add('hit-anim');
            setTimeout(() => target.classList.remove('hit-anim'), 200);
        }

        function updateHp() {
            document.getElementById('hp1').style.width = Math.max(0, hp1) + '%';
            document.getElementById('hp2').style.width = Math.max(0, hp2) + '%';
            
            // Цвет полоски меняется на красный при низком HP
            if(hp1 < 30) document.getElementById('hp1').style.background = '#f00';
            if(hp2 < 30) document.getElementById('hp2').style.background = '#f00';
        }

        function endGame() {
            isFighting = false;
            let winner = '';
            if (hp1 > 0) winner = 'p1';
            else winner = 'p2';

            const winName = winner === 'p1' ? '[FBI] Timmy_Roobeer' : '[Governor] Nazario Corleone';
            document.getElementById('winner-text').innerText = `ПОБЕДИТЕЛЬ: ${winName}`;
            
            if (winner === userChoice) {
                log(`ВЫ ВЫИГРАЛИ ${userBet * 2} BTC!`);
                document.getElementById('winner-text').style.color = '#0f0';
            } else {
                log(`ВЫ ПРОИГРАЛИ СТАВКУ.`);
                document.getElementById('winner-text').style.color = '#f00';
            }

            document.getElementById('result-display').style.display = 'block';
        }

        function resetGame() {
            hp1 = 100;
            hp2 = 100;
            updateHp();
            document.getElementById('hp1').style.background = '#0f0';
            document.getElementById('hp2').style.background = '#0f0';
            document.getElementById('battle-log').innerHTML = '';
            document.getElementById('result-display').style.display = 'none';
            document.getElementById('betting-panel').style.display = 'block';
            document.getElementById('winner-text').style.color = '#0f0';
        }
    </script>
</body>
</html>
